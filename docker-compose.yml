version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_WS_URL=ws://localhost:4000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
